name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Install Java & Android SDK
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk unzip wget
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O sdk.zip
          unzip sdk.zip
          mv cmdline-tools latest
          mkdir cmdline-tools
          mv latest cmdline-tools/
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses
          # Instalar duas versões estáveis para garantir o aidl
          yes | sdkmanager --install "platform-tools" "platforms;android-33" "build-tools;33.0.2" "build-tools;34.0.0"

      - name: Select AIDL
        run: |
          echo "Verificando AIDL..."
          if [ -f "$ANDROID_HOME/build-tools/33.0.2/aidl" ]; then
            echo "Usando AIDL da versão 33.0.2"
            echo "export PATH=$ANDROID_HOME/build-tools/33.0.2:\$PATH" >> $GITHUB_ENV
          elif [ -f "$ANDROID_HOME/build-tools/34.0.0/aidl" ]; then
            echo "Usando AIDL da versão 34.0.0"
            echo "export PATH=$ANDROID_HOME/build-tools/34.0.0:\$PATH" >> $GITHUB_ENV
          else
            echo "Erro: AIDL não encontrado em nenhuma versão instalada"
            exit 1
          fi

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
